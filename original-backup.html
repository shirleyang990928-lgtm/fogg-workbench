<main class="stage">

function uid(prefix){return prefix+"-"+Date.now().toString(36)+"-"+Math.random().toString(36).slice(2,7);}
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]));}
function safeAttr(s){return esc(s).replace(/`/g,"&#096;");}
function normalizeCategory(x,i=0){return {id:x.id||uid("cat"),name:x.name||"未分类",color:PRESET_COLORS.includes(x.color)?x.color:PRESET_COLORS[i%PRESET_COLORS.length]};}
function categoryColor(cat,list=stickerCategories){return (list.find(x=>x.name===cat)||{}).color||PRESET_COLORS[0];}
function stageName(stage){return STAGE_LABELS[stage]||stage;}
function getStickerCat(x){return x.category||x.cat||"未分类";} function getStickerText(x){return x.content??x.text??"";} function getStickerTag(x){return x.tags||x.type||"";}
function normalizeSticker(x){const cat=x.category||x.cat||"未分类", text=x.content??x.text??"", tag=x.tags||x.type||"";return {id:x.id||uid("sticker"),stage:x.stage||"before",category:cat,cat,type:tag,tags:tag,title:x.title||"未命名",content:text,text,note:x.note||""};}
function normalizeStudent(s){return typeof s==="string"?{id:uid("student"),name:s,note:""}:{id:s.id||uid("student"),name:s.name||"未命名学生",note:s.note||""};}
function normalizeNote(n){const now=new Date().toISOString();return {id:n.id||uid("note"),text:n.text||"",createdAt:n.createdAt||now,updatedAt:n.updatedAt||n.createdAt||now};}
function normalizeCourseName(name){return {"精读":"英文精读","中文":"中文阅读营"}[name]||name||"英文精读";}
function normalizeClassItem(x){return {id:x.id||uid("class"),weekday:x.weekday||"周一",time:x.time||"",teacher:x.teacher||"",courseType:normalizeCourseName(x.courseType),className:x.className||"未命名课程",status:x.status||"Active",students:(x.students||[]).map(normalizeStudent),notes:(x.notes||[]).map(normalizeNote)};}
function loadCollection(key,fallback,normalizer){try{const raw=localStorage.getItem(key);if(!raw)return fallback.map(normalizer);const parsed=JSON.parse(raw);if(!Array.isArray(parsed))throw new Error("Data is not an array");return parsed.map(normalizer);}catch(err){console.warn("localStorage read failed",key,err);setTimeout(()=>showToast("本地数据读取失败，已使用默认数据"),0);return fallback.map(normalizer);}}

function updateClock(){const now=new Date();let h=now.getHours();const ampm=h>=12?"PM":"AM";h=h%12||12;document.getElementById("time").innerHTML=h+":"+String(now.getMinutes()).padStart(2,"0")+" <small>"+ampm+"</small>";const days=["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];document.getElementById("date").textContent=now.getFullYear()+"年"+(now.getMonth()+1)+"月"+now.getDate()+"日 · "+days[now.getDay()];}
function getCats(){if(currentStage==="schedule")return ["全部",...WEEKDAYS];const cats=stickersData.filter(x=>x.stage===currentStage).map(getStickerCat);return ["全部",...Array.from(new Set(cats))];}
function filtered(){return stickersData.filter(x=>x.stage===currentStage&&(currentCat==="全部"||getStickerCat(x)===currentCat));}
function filteredSchedule(){return scheduleData.filter(x=>currentCat==="全部"||x.weekday===currentCat).sort((a,b)=>WEEKDAYS.indexOf(a.weekday)-WEEKDAYS.indexOf(b.weekday)||String(a.time).localeCompare(String(b.time)));}
function renderTabs(){document.getElementById("tabs").innerHTML=getCats().map(cat=>`<button class="tab ${cat===currentCat?'active':''}" data-cat="${safeAttr(cat)}">${esc(cat)}</button>`).join("");document.querySelectorAll(".tab").forEach(btn=>btn.addEventListener("click",()=>{currentCat=btn.dataset.cat;render();}));}
function renderCards(){if(currentStage==="schedule")return renderSchedule();const list=filtered();document.getElementById("counter").textContent=list.length+" stickers";document.getElementById("cards").className="cards";document.getElementById("cards").innerHTML=list.map((x,i)=>{const cat=getStickerCat(x),tag=getStickerTag(x),text=getStickerText(x),color=categoryColor(cat);return `<button class="card ${x.stage==='ai'?'prompt-card':''}" data-index="${i}" data-id="${safeAttr(x.id)}" data-cat="${safeAttr(cat)}" style="--pill-bg:${safeAttr(color)}"><div class="meta"><span class="badge" data-cat="${safeAttr(cat)}" style="--pill-bg:${safeAttr(color)}">${esc(cat)}</span>${tag?`<span class="badge type">${esc(tag)}</span>`:""}</div><b>${esc(x.title)}</b><p>${esc(text)}</p></button>`;}).join("");document.querySelectorAll(".card").forEach((btn,i)=>btn.addEventListener("click",()=>copyText(getStickerText(list[i]))));}
function renderSchedule(){const list=filteredSchedule();document.getElementById("counter").textContent=list.length+" classes";const grouped=currentCat==="全部"?WEEKDAYS.map(day=>[day,list.filter(x=>x.weekday===day)]).filter(([,items])=>items.length):[[currentCat,list]];document.getElementById("cards").className="cards schedule-board";document.getElementById("cards").innerHTML=(grouped.length?grouped:[[currentCat,[]]]).map(([day,items])=>`<section class="day-group"><div class="day-title"><span>${esc(day)}</span><span>${items.length} 节课</span></div>${items.length?items.map(renderClassCard).join(""):`<p class="hint">这一天还没有课程，点击“管理日程”添加。</p>`}</section>`).join("");document.querySelectorAll("[data-class-id]").forEach(btn=>btn.addEventListener("click",()=>openClassDetail(btn.dataset.classId)));}
function renderClassCard(x){const color=categoryColor(x.courseType,courseCategories),inactive=x.status==="Inactive";return `<button class="card class-card ${inactive?'inactive':''}" data-class-id="${safeAttr(x.id)}" style="--course-color:${safeAttr(color)};--course-bg:${safeAttr(color)}"><div class="class-time">${esc(x.time||"未定时间")}</div><b>${esc(x.className)}</b><div class="class-line"><span class="course-pill">${esc(x.courseType)}</span><span class="status-pill ${inactive?'inactive':''}">${inactive?'Inactive':'Active'}</span></div><div class="class-line"><span class="badge type">${esc(x.teacher||"未填老师")}</span></div><div>${x.students.slice(0,4).map(s=>`<span class="student-chip" title="${safeAttr(s.note)}">${esc(s.name)}</span>`).join("")||'<span class="hint">暂无学生</span>'}</div><p>${esc((x.notes[0]&&x.notes[0].text)||"点击打开课程详情和笔记。")}</p></button>`;}
function render(){document.querySelector(".panel").dataset.stage=currentStage;document.getElementById("panelTitle").textContent=currentStage==="schedule"?"Class Schedule · 排课表":currentStage==="ai"?"AI Prompts · 生成提示":"Reply Stickers · 快捷话术";document.getElementById("manageScheduleBtn").style.display=currentStage==="schedule"?"inline-flex":"none";document.getElementById("manageStickersBtn").style.display=currentStage==="schedule"?"none":"inline-flex";renderTabs();renderCards();document.querySelectorAll(".station").forEach(btn=>btn.classList.toggle("active",btn.dataset.stage===currentStage));}
async function copyText(text){let ok=false;try{await navigator.clipboard.writeText(text);ok=true;}catch(e){const ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.left="-9999px";document.body.appendChild(ta);ta.select();try{ok=document.execCommand("copy");}catch(err){}document.body.removeChild(ta);}showToast(ok?"Copied":"Copy blocked");}
function showToast(msg){const toast=document.getElementById("toast");if(!toast)return;toast.textContent=msg;toast.classList.add("show");setTimeout(()=>toast.classList.remove("show"),1100);}
function openDrawer(mode){document.getElementById("drawerBackdrop").hidden=false;if(mode==="stickers")renderStickerManager();else renderScheduleManager();} function closeDrawer(){document.getElementById("drawerBackdrop").hidden=true;}
function renderStickerManager(){const selected=stickersData.find(x=>x.id===editingStickerId)||null;document.getElementById("drawerKicker").textContent="stickersData · category palette";document.getElementById("drawerTitle").textContent="编辑话术";document.getElementById("drawerBody").innerHTML=`<div class="manager-grid"><section class="manager-list"><h3>话术列表</h3><div class="item-list">${stickersData.map(x=>`<button class="list-item ${x.id===editingStickerId?'active':''}" data-edit-sticker="${safeAttr(x.id)}"><b>${esc(x.title)}</b><span>${esc(stageName(x.stage))} · ${esc(getStickerCat(x))} · ${esc(getStickerTag(x))}</span></button>`).join("")}</div></section><section class="manager-form"><h3>${selected?'编辑当前话术':'新增话术'}</h3>${stickerFormHtml(selected)}</section></div>${categoryManagerHtml('sticker')}${advancedBackupHtml('sticker')}`;}
function stickerFormHtml(x){x=x||{stage:currentStage==="schedule"?"before":currentStage,category:stickerCategories[0]?.name||"群提醒",title:"",content:"",tags:"",note:""};return `<div class="field-grid"><label class="field">Stage<select id="stickerStage"><option value="before" ${x.stage==='before'?'selected':''}>课前</option><option value="during" ${x.stage==='during'?'selected':''}>课中</option><option value="after" ${x.stage==='after'?'selected':''}>课后</option><option value="ai" ${x.stage==='ai'?'selected':''}>AI生成</option></select></label><label class="field">Category<select id="stickerCategory">${stickerCategories.map(c=>`<option value="${safeAttr(c.name)}" ${getStickerCat(x)===c.name?'selected':''}>${esc(c.name)}</option>`).join("")}</select></label><label class="field">Title<input id="stickerTitle" value="${safeAttr(x.title)}" placeholder="卡片标题"></label><label class="field">Tag / subcategory<input id="stickerTags" value="${safeAttr(getStickerTag(x))}" placeholder="如：Camera / 作业"></label><label class="field full">Optional note<input id="stickerNote" value="${safeAttr(x.note||"")}" placeholder="仅管理时查看"></label><label class="field full">Content<textarea id="stickerContent" placeholder="要复制的话术内容">${esc(getStickerText(x))}</textarea></label></div><div class="form-actions"><button class="primary-btn" id="saveStickerBtn" type="button">Save</button><button class="secondary-btn" id="newStickerBtn" type="button">Add new</button>${editingStickerId?'<button class="danger-btn" id="deleteStickerBtn" type="button">Delete</button>':''}</div>`;}
function categoryManagerHtml(kind){const list=kind==='sticker'?stickerCategories:courseCategories,selected=kind==='sticker'?selectedStickerCategory:selectedCourseCategory,prefix=kind==='sticker'?'stickerCat':'courseCat';return `<section class="json-box"><h3>${kind==='sticker'?'话术分类颜色':'课程类型分类'}</h3><div class="category-grid">${list.map(c=>`<div class="category-row"><button class="list-item ${selected===c.name?'active':''}" data-select-${prefix}="${safeAttr(c.name)}"><b>${esc(c.name)}</b></button><span class="color-dot" style="background:${safeAttr(c.color)}"></span><button class="mini-btn" data-delete-${prefix}="${safeAttr(c.name)}" type="button">Delete</button></div>`).join("")}</div><div class="field-grid" style="margin-top:12px"><label class="field">Name<input id="${prefix}Name" value="${safeAttr(selected)}"></label><label class="field">Preset color<div class="palette-grid">${PRESET_COLORS.map(color=>`<button class="palette-choice ${categoryColor(selected,list)===color?'active':''}" data-${prefix}-color="${color}" style="background:${color}" type="button"></button>`).join("")}</div></label></div><div class="form-actions"><button class="primary-btn" id="save${prefix}Btn" type="button">Save category</button><button class="secondary-btn" id="add${prefix}Btn" type="button">Add category</button></div><p class="hint">颜色属于分类；修改分类颜色后，同分类所有卡片会一起更新。</p></section>`;}
function advancedBackupHtml(kind){return `<details class="advanced-box"><summary>Advanced / Backup JSON</summary><section class="json-box"><textarea id="${kind}Json" placeholder="Export 后会显示 JSON；也可以粘贴 JSON 后 Import。"></textarea><div class="json-actions"><button class="secondary-btn" id="export${kind}Btn" type="button">Export JSON</button><button class="primary-btn" id="import${kind}Btn" type="button">Import JSON</button>${kind==='sticker'?'<button class="danger-btn" id="resetStickersBtn" type="button">Reset default stickers</button>':'<button class="secondary-btn" id="resetScheduleBtn" type="button">Reset demo</button><button class="danger-btn" id="clearScheduleBtn" type="button">Clear schedule</button>'}</div></section></details>`;}
function saveStickerFromForm(){const item={id:editingStickerId||uid("sticker"),stage:val("stickerStage"),category:val("stickerCategory")||"未分类",title:val("stickerTitle")||"未命名",content:val("stickerContent"),tags:val("stickerTags"),note:val("stickerNote")};const normalized=normalizeSticker(item);const idx=stickersData.findIndex(x=>x.id===editingStickerId);if(idx>=0)stickersData[idx]=normalized;else stickersData.push(normalized);editingStickerId=normalized.id;saveStickers();currentStage=normalized.stage;currentCat="全部";render();renderStickerManager();showToast("话术已保存");}
function openClassDetail(id){editingClassId=id;openDrawer('schedule');}
function renderScheduleManager(){const selected=scheduleData.find(x=>x.id===editingClassId)||null;document.getElementById("drawerKicker").textContent="scheduleData · class notebook";document.getElementById("drawerTitle").textContent=selected?"课程详情":"管理日程";document.getElementById("drawerBody").innerHTML=`<div class="manager-grid"><section class="manager-list"><h3>课程列表</h3><div class="item-list">${scheduleData.map(x=>`<button class="list-item ${x.id===editingClassId?'active':''}" data-edit-class="${safeAttr(x.id)}"><b>${esc(x.weekday)} ${esc(x.time)} · ${esc(x.className)}</b><span>${esc(x.courseType)} · ${esc(x.status||'Active')} · ${x.students.length} students</span></button>`).join("")||'<p class="hint">还没有课程，先新增一节课吧。</p>'}</div><button class="primary-btn" id="newClassBtn" type="button">Add new class</button></section><section class="manager-form"><h3>${selected?'Class notebook':'新增课程'}</h3>${scheduleFormHtml(selected)}</section></div>${categoryManagerHtml('course')}${advancedBackupHtml('schedule')}`;}
function scheduleFormHtml(x){x=x||{weekday:currentCat!=="全部"&&WEEKDAYS.includes(currentCat)?currentCat:"周一",time:"",teacher:"",courseType:courseCategories[0]?.name||"英文精读",className:"",status:"Active",students:[],notes:[]};return `<div class="class-detail-grid"><section class="notebook-panel"><h3>Basic info</h3><div class="field-grid"><label class="field">Weekday<select id="classWeekday">${WEEKDAYS.map(d=>`<option value="${d}" ${x.weekday===d?'selected':''}>${d}</option>`).join("")}</select></label><label class="field">Time<input id="classTime" type="time" value="${safeAttr(x.time)}"></label><label class="field">Status<select class="status-select" id="classStatus"><option value="Active" ${x.status!=='Inactive'?'selected':''}>Active</option><option value="Inactive" ${x.status==='Inactive'?'selected':''}>Inactive</option></select></label><label class="field">Course type<select id="classCourseType">${courseCategories.map(t=>`<option value="${safeAttr(t.name)}" ${x.courseType===t.name?'selected':''}>${esc(t.name)}</option>`).join("")}</select></label><label class="field">Teacher<input id="classTeacher" value="${safeAttr(x.teacher)}" placeholder="老师"></label><label class="field full">Class name<input id="className" value="${safeAttr(x.className)}" placeholder="课程 / 班级名称"></label><label class="field full">Students <span class="hint">每行一个学生；可写：姓名 | 备注</span><textarea id="classStudents" placeholder="Annika | 阅读提醒">${esc(x.students.map(s=>s.name+(s.note?' | '+s.note:'')).join('\n'))}</textarea></label></div></section><section class="notebook-panel"><h3>Notebook notes</h3><label class="field">Add note<textarea id="newClassNote" placeholder="新增一条课堂笔记 / 备忘"></textarea></label>${notesHtml(x)}</section></div><div class="form-actions"><button class="primary-btn" id="saveClassBtn" type="button">Save class</button><button class="secondary-btn" id="newClassBtn" type="button">Add new class</button>${editingClassId?'<button class="danger-btn" id="deleteClassBtn" type="button">Delete class</button>':''}</div>`;}
function notesHtml(x){return `<div class="note-list">${(x.notes||[]).map(n=>`<div class="note-row"><p>${esc(n.text)}</p><small>${formatDate(n.updatedAt)}</small><div class="note-actions"><button class="mini-btn" data-edit-note="${safeAttr(n.id)}" type="button">Edit note</button><button class="mini-btn" data-delete-note="${safeAttr(n.id)}" type="button">Delete note</button></div></div>`).join("")||'<p class="hint">暂无历史笔记。</p>'}</div>`;}
function saveClassFromForm(){const existing=scheduleData.find(x=>x.id===editingClassId);const noteText=val("newClassNote").trim();const item=normalizeClassItem({id:editingClassId||uid("class"),weekday:val("classWeekday"),time:val("classTime"),teacher:val("classTeacher"),courseType:val("classCourseType"),className:val("className")||"未命名课程",status:val("classStatus")||"Active",students:parseStudents(val("classStudents")),notes:existing?existing.notes:[]});if(noteText)item.notes.unshift({id:uid("note"),text:noteText,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()});const idx=scheduleData.findIndex(x=>x.id===editingClassId);if(idx>=0)scheduleData[idx]=item;else scheduleData.push(item);editingClassId=item.id;saveSchedule();currentStage="schedule";currentCat="全部";render();renderScheduleManager();showToast("日程已保存");}
function parseStudents(text){return text.split(/\n+/).map(line=>line.trim()).filter(Boolean).map(line=>{const [name,...note]=line.split("|");return {id:uid("student"),name:name.trim(),note:note.join("|").trim()};});}
function val(id){const el=document.getElementById(id);return el?el.value:"";} function formatDate(iso){try{return new Date(iso).toLocaleString("zh-CN",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});}catch(e){return iso||"";}}
function exportJson(id,data){document.getElementById(id).value=JSON.stringify(data,null,2);showToast("JSON 已导出");} function importJson(id,onSave){try{const parsed=JSON.parse(document.getElementById(id).value);onSave(parsed);showToast("导入成功");}catch(err){showToast("导入失败：JSON 格式不正确");}}
function handleStickerCategorySave(){const old=selectedStickerCategory,name=val('stickerCatName').trim()||old,color=document.querySelector('.palette-choice.active[data-stickerCat-color]')?.dataset.stickercatColor||categoryColor(old);let cat=stickerCategories.find(x=>x.name===old);if(!cat){cat={id:uid('cat'),name,color};stickerCategories.push(cat);}cat.name=name;cat.color=color;if(old!==name)stickersData.forEach(x=>{if(getStickerCat(x)===old){x.category=name;x.cat=name;}});selectedStickerCategory=name;saveStickerCategories();saveStickers();render();renderStickerManager();}
function handleCourseCategorySave(){const old=selectedCourseCategory,name=val('courseCatName').trim()||old,color=document.querySelector('.palette-choice.active[data-courseCat-color]')?.dataset.coursecatColor||categoryColor(old,courseCategories);let cat=courseCategories.find(x=>x.name===old);if(!cat){cat={id:uid('course'),name,color};courseCategories.push(cat);}cat.name=name;cat.color=color;if(old!==name)scheduleData.forEach(x=>{if(x.courseType===old)x.courseType=name;});selectedCourseCategory=name;saveCourseCategories();saveSchedule();render();renderScheduleManager();}
document.querySelectorAll(".station").forEach(btn=>btn.addEventListener("click",()=>{currentStage=btn.dataset.stage;currentCat="全部";render();}));document.getElementById("manageStickersBtn").addEventListener("click",()=>openDrawer("stickers"));document.getElementById("manageScheduleBtn").addEventListener("click",()=>openDrawer("schedule"));document.getElementById("closeDrawerBtn").addEventListener("click",closeDrawer);document.getElementById("drawerBackdrop").addEventListener("click",e=>{if(e.target.id==="drawerBackdrop")closeDrawer();});
document.getElementById("drawerBody").addEventListener("click",e=>{const t=e.target;if(t.dataset.editSticker){editingStickerId=t.dataset.editSticker;renderStickerManager();}if(t.id==="newStickerBtn"){editingStickerId=null;renderStickerManager();}if(t.id==="saveStickerBtn")saveStickerFromForm();if(t.id==="deleteStickerBtn"&&editingStickerId&&confirm("Delete this sticker?")){stickersData=stickersData.filter(x=>x.id!==editingStickerId);editingStickerId=null;saveStickers();render();renderStickerManager();showToast("话术已删除");}if(t.dataset.selectStickercat){selectedStickerCategory=t.dataset.selectStickercat;renderStickerManager();}if(t.dataset.stickercatColor){document.querySelectorAll('[data-stickerCat-color]').forEach(b=>b.classList.remove('active'));t.classList.add('active');}if(t.id==="savestickerCatBtn")handleStickerCategorySave();if(t.id==="addstickerCatBtn"){selectedStickerCategory="新分类";stickerCategories.push({id:uid('cat'),name:"新分类",color:PRESET_COLORS[0]});saveStickerCategories();renderStickerManager();}if(t.dataset.deleteStickercat&&confirm("Delete this category? Stickers will move to 未分类.")){const name=t.dataset.deleteStickercat;stickerCategories=stickerCategories.filter(x=>x.name!==name);stickersData.forEach(x=>{if(getStickerCat(x)===name){x.category="未分类";x.cat="未分类";}});selectedStickerCategory=stickerCategories[0]?.name||"未分类";saveStickerCategories();saveStickers();render();renderStickerManager();}if(t.id==="exportstickerBtn")exportJson("stickerJson",{stickers:stickersData,categories:stickerCategories});if(t.id==="importstickerBtn")importJson("stickerJson",data=>{stickersData=(Array.isArray(data)?data:data.stickers||[]).map(normalizeSticker);stickerCategories=(data.categories||DEFAULT_STICKER_CATEGORIES).map(normalizeCategory);saveStickers();saveStickerCategories();render();renderStickerManager();});if(t.id==="resetStickersBtn"&&confirm("Reset stickers to built-in defaults?")){stickersData=DEFAULT_STICKERS.map(normalizeSticker);stickerCategories=DEFAULT_STICKER_CATEGORIES.map(normalizeCategory);saveStickers();saveStickerCategories();editingStickerId=null;render();renderStickerManager();showToast("已恢复默认话术");}if(t.dataset.editClass){editingClassId=t.dataset.editClass;renderScheduleManager();}if(t.id==="newClassBtn"){editingClassId=null;renderScheduleManager();}if(t.id==="saveClassBtn")saveClassFromForm();if(t.id==="deleteClassBtn"&&editingClassId&&confirm("Delete this class?")){scheduleData=scheduleData.filter(x=>x.id!==editingClassId);editingClassId=null;saveSchedule();render();renderScheduleManager();showToast("课程已删除");}if(t.dataset.selectCoursecat){selectedCourseCategory=t.dataset.selectCoursecat;renderScheduleManager();}if(t.dataset.coursecatColor){document.querySelectorAll('[data-courseCat-color]').forEach(b=>b.classList.remove('active'));t.classList.add('active');}if(t.id==="savecourseCatBtn")handleCourseCategorySave();if(t.id==="addcourseCatBtn"){selectedCourseCategory="新课程类型";courseCategories.push({id:uid('course'),name:"新课程类型",color:PRESET_COLORS[0]});saveCourseCategories();renderScheduleManager();}if(t.dataset.deleteCoursecat&&confirm("Delete this course type? Classes will move to 其他.")){const name=t.dataset.deleteCoursecat;courseCategories=courseCategories.filter(x=>x.name!==name);scheduleData.forEach(x=>{if(x.courseType===name)x.courseType="其他";});selectedCourseCategory=courseCategories[0]?.name||"其他";saveCourseCategories();saveSchedule();render();renderScheduleManager();}if(t.id==="exportscheduleBtn")exportJson("scheduleJson",{classes:scheduleData,categories:courseCategories});if(t.id==="importscheduleBtn")importJson("scheduleJson",data=>{scheduleData=(Array.isArray(data)?data:data.classes||[]).map(normalizeClassItem);courseCategories=(data.categories||DEFAULT_COURSE_CATEGORIES).map(normalizeCategory);saveSchedule();saveCourseCategories();render();renderScheduleManager();});if(t.id==="resetScheduleBtn"&&confirm("Reset schedule demo data?")){scheduleData=DEFAULT_SCHEDULE.map(normalizeClassItem);courseCategories=DEFAULT_COURSE_CATEGORIES.map(normalizeCategory);saveSchedule();saveCourseCategories();editingClassId=null;render();renderScheduleManager();showToast("已恢复示例日程");}if(t.id==="clearScheduleBtn"&&confirm("Clear all schedule data?")){scheduleData=[];saveSchedule();editingClassId=null;render();renderScheduleManager();showToast("日程已清空");}if(t.dataset.editNote){const cls=scheduleData.find(x=>x.id===editingClassId);const note=cls&&cls.notes.find(n=>n.id===t.dataset.editNote);if(note){const text=prompt("Edit note",note.text);if(text!==null){note.text=text;note.updatedAt=new Date().toISOString();saveSchedule();render();renderScheduleManager();}}}if(t.dataset.deleteNote&&confirm("Delete this note?")){const cls=scheduleData.find(x=>x.id===editingClassId);if(cls){cls.notes=cls.notes.filter(n=>n.id!==t.dataset.deleteNote);saveSchedule();render();renderScheduleManager();}}});
updateClock(); setInterval(updateClock,1000); render();
</script>
