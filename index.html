<!doctype html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>课堂工作台</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>

<!-- 登录页 -->
<div id="loginOverlay" style="position:fixed;inset:0;background:#f5f2e6;display:flex;align-items:center;justify-content:center;z-index:100;background-image:radial-gradient(rgba(28,33,26,.13) 1.25px,transparent 1.25px);background-size:24px 24px">
  <div style="background:#fffdf5;border:2px solid #1c211a;border-radius:20px;padding:36px 32px;width:340px;box-shadow:4px 4px 0 #1c211a;font-family:'Microsoft YaHei',system-ui,sans-serif">
    <div style="text-align:center;margin-bottom:28px">
      <div style="width:56px;height:40px;background:#de8a62;border:2px solid #1c211a;border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:950;margin-bottom:10px">FOGG</div>
      <div style="font-size:22px;font-weight:950">课堂工作台</div>
      <div style="font-size:13px;color:#888;margin-top:4px">FOGG Academy</div>
    </div>
    <label style="display:block;margin-bottom:14px;font-size:13px;font-weight:900;color:#333">邮箱
      <input id="loginEmail" type="email" style="display:block;width:100%;margin-top:6px;padding:11px 13px;border:2px solid #1c211a;border-radius:11px;font-size:14px;box-sizing:border-box;background:#fff;outline:none" placeholder="your@email.com">
    </label>
    <label style="display:block;margin-bottom:8px;font-size:13px;font-weight:900;color:#333">密码
      <input id="loginPassword" type="password" style="display:block;width:100%;margin-top:6px;padding:11px 13px;border:2px solid #1c211a;border-radius:11px;font-size:14px;box-sizing:border-box;background:#fff;outline:none" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </label>
    <div id="loginError" style="color:#c0392b;font-size:12px;min-height:20px;margin-bottom:8px;padding-left:2px"></div>
    <button onclick="doLogin()" style="width:100%;padding:13px;background:#de8a62;border:2px solid #1c211a;border-radius:11px;font-size:15px;font-weight:950;cursor:pointer;box-shadow:3px 3px 0 #1c211a">登录</button>
    <p style="font-size:11px;color:#aaa;text-align:center;margin:14px 0 0">如需账号请联系管理员</p>
  </div>
</div>

<!-- 主应用 -->
<main class="app-shell" id="appShell" style="display:none">
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">FOGG</span>
      <div>
        <div class="brand-kicker">FOGG Academy</div>
        <h1>课堂工作台</h1>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <span id="userBadge" style="font-size:12px;color:#666;font-weight:850"></span>
      <button onclick="doLogout()" style="font-size:12px;padding:5px 10px;border:1.5px solid rgba(28,33,26,.4);border-radius:8px;background:#fff;cursor:pointer;font-weight:900">退出</button>
      <div class="clock"><div class="time" id="time">--:--</div><div class="date" id="date">----</div></div>
    </div>
  </header>
  <nav class="main-nav" aria-label="main navigation">
    <button class="nav-btn active" data-view="today"><span>日程</span><small>本周课表</small></button>
    <button class="nav-btn" data-view="stickers"><span>话术</span><small>快速复制</small></button>
    <button class="nav-btn" data-view="manage"><span>管理</span><small>整理与备份</small></button>
  </nav>
  <section class="workspace">
    <div class="workspace-head">
      <div><h2 id="viewTitle">今日</h2><p id="viewSubtitle"></p></div>
      <div class="count-pill" id="counter"></div>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="content" id="content"></div>
  </section>
</main>

<div class="toast" id="toast"></div>
<div class="detail-modal" id="detailModal" aria-hidden="true">
  <div class="detail-panel">
    <button class="detail-close" id="detailClose" type="button">关闭</button>
    <div class="tag-row" id="detailTags"></div>
    <h3 id="detailTitle"></h3>
    <div class="detail-content" id="detailContent"></div>
    <div class="detail-footer">
      <button class="btn" id="detailOpenZoom" type="button">Zoom</button>
      <button class="btn" id="detailEdit" type="button">编辑</button>
      <button class="btn primary" id="detailCopy" type="button">复制这条话术</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
/* ===== TODO 修复：在 app.js 之后强制覆盖，确保生效 ===== */
(function(){
  /* 缓存输入值 */
  var _cache="";
  document.addEventListener("input",function(e){
    if(e.target&&e.target.id==="todoInput") _cache=e.target.value;
  },true);

  /* 覆盖 renderTodoNotebook */
  window.renderTodoNotebook=function(day,items){
    var dk=dateKey(day);
    var raw=localStorage.getItem(DAILY_TODO_KEY)||"{}";
    var obj={};try{obj=JSON.parse(raw);}catch(e){}
    var todos=Array.isArray(obj[dk])?obj[dk]:[];
    var isToday=dk===dateKey(new Date());
    var courses=activeClasses();
    var opts=courses.length?'<select id="todoClassLink" class="todo-class-select-mini"><option value="">↳ 不关联课程</option>'+courses.map(function(c){return '<option value="'+c.id+'|'+dk+'">'+esc(c.weekday)+" "+esc(formatTimeCN(c.time))+" "+esc(c.className)+"</option>";}).join("")+"</select>":"";
    var listHtml="";
    if(todos.length){
      for(var i=0;i<todos.length;i++){
        var t=todos[i];
        var cls=t.done?"todo-item done":"todo-item";
        var badge=t.classLinkName?'<em class="todo-class-badge">↳'+esc(t.classLinkName)+"</em>":"";
        listHtml+='<div class="'+cls+'"><button class="todo-check" data-todo-idx="'+i+'" type="button"></button><span class="todo-text">'+esc(t.text)+badge+'</span><button class="todo-delete" data-todo-rm="'+i+'" type="button">✕</button></div>';
      }
    }else{
      listHtml='<div class="todo-empty">还没有待办，随手加一条。</div>';
    }
    return '<section class="todo-notebook today-summary"><div class="todo-top"><div><span>当天待办</span><h3>'+(isToday?"今天":dateLabel(day))+'</h3></div><input id="todoDatePicker" type="date" value="'+dk+'"></div><div class="todo-date-nav"><button class="btn" data-todo-move="-1" type="button">前一天</button><b>'+monthTitle(day)+" "+day.getDate()+" · "+todayName(daysBetween(day,new Date()))+'</b><button class="btn" data-todo-move="1" type="button">后一天</button></div><div class="todo-list">'+listHtml+'</div><div class="todo-compact-add"><input id="todoInput" class="todo-compact-input" placeholder="随手记…"><button id="todoAdd" class="todo-plus-btn" type="button">+</button>'+opts+'</div></section>';
  };

  /* 覆盖 todosForDay */
  window.todosForDay=function(day,items){
    var raw=localStorage.getItem(DAILY_TODO_KEY)||"{}";
    var obj={};try{obj=JSON.parse(raw);}catch(e){}
    var dk=dateKey(day);
    return Array.isArray(obj[dk])?obj[dk]:[];
  };

  /* 保存 todos 到 localStorage */
  function saveTodos(dk,todos){
    var raw=localStorage.getItem(DAILY_TODO_KEY)||"{}";
    var obj={};try{obj=JSON.parse(raw);}catch(e){}
    obj[dk]=todos;
    localStorage.setItem(DAILY_TODO_KEY,JSON.stringify(obj));
    if(typeof syncToCloud==="function"&&currentUser) syncToCloud().catch(function(){});
  }

  /* 添加 */
  function addTodo(){
    var text=_cache.trim();
    if(!text){
      var el=document.getElementById("todoInput");
      if(el) text=el.value.trim();
    }
    if(!text){showToast("请先输入内容");return;}
    var day=todoDate();
    var dk=dateKey(day);
    var items=classesOnDate(displayClasses(),day);
    var todos=todosForDay(day,items);
    var linkEl=document.getElementById("todoClassLink");
    var linkVal=linkEl?linkEl.value.trim():"";
    var linkName="";
    if(linkVal){
      var cid=linkVal.split("|")[0];
      var c=scheduleData.find(function(x){return x.id===cid;});
      if(c) linkName=c.className||"";
    }
    todos.push({id:uid("todo"),text:text,done:false,classLink:linkVal||undefined,classLinkName:linkName||undefined});
    saveTodos(dk,todos);
    _cache="";
    var inp=document.getElementById("todoInput");
    if(inp) inp.value="";
    render();
    showToast("已添加："+text);
  }

  /* 事件委托 - capture 阶段最先触发 */
  document.addEventListener("click",function(e){
    var t=e.target;
    /* + 按钮 */
    if(t.id==="todoAdd"||t.classList.contains("todo-plus-btn")){
      e.stopImmediatePropagation();addTodo();return;
    }
    if(t.parentElement&&(t.parentElement.id==="todoAdd"||t.parentElement.classList.contains("todo-plus-btn"))){
      e.stopImmediatePropagation();addTodo();return;
    }
    /* 勾选 */
    var tog=t.closest?t.closest("[data-todo-idx]"):null;
    if(tog){
      e.stopImmediatePropagation();
      var day=todoDate(),dk=dateKey(day);
      var items=classesOnDate(displayClasses(),day);
      var todos=todosForDay(day,items);
      var idx=Number(tog.dataset.todoIdx);
      if(todos[idx]){todos[idx].done=!todos[idx].done;saveTodos(dk,todos);render();}
      return;
    }
    /* 删除 */
    var del=t.closest?t.closest("[data-todo-rm]"):null;
    if(del){
      e.stopImmediatePropagation();
      var day2=todoDate(),dk2=dateKey(day2);
      var items2=classesOnDate(displayClasses(),day2);
      var todos2=todosForDay(day2,items2);
      todos2.splice(Number(del.dataset.todoRm),1);
      saveTodos(dk2,todos2);render();
      return;
    }
  },true);

  /* Enter 键 */
  document.addEventListener("keydown",function(e){
    if(e.key==="Enter"&&e.target&&e.target.id==="todoInput"){
      e.preventDefault();e.stopImmediatePropagation();addTodo();
    }
  },true);
})();
</script>
</body>
</html>
